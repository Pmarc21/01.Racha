version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: racha_api
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: racha_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - CHOKIDAR_USEPOLLING=true

  db:
    image: postgres:16
    container_name: racha_db
    environment:
      POSTGRES_DB: racha
      POSTGRES_USER: racha
      POSTGRES_PASSWORD: racha
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
  
  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports: 
      - 8080:8080

volumes:
  postgres_data:
